  <head>
    <script>
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
        
        // Apply saved palette
        var pn = localStorage.getItem('palette-name');
        if (pn === 'custom') {
          var cp = JSON.parse(localStorage.getItem('custom-palette') || '{}');
          var pal = t !== 'light' ? cp.dark : cp.light;
          if (pal) {
            var map = {background:'--background',foreground:'--foreground',card:'--card',cardForeground:'--card-foreground',popover:'--popover',popoverForeground:'--popover-foreground',primary:'--primary',primaryForeground:'--primary-foreground',secondary:'--secondary',secondaryForeground:'--secondary-foreground',muted:'--muted',mutedForeground:'--muted-foreground',accent:'--accent',accentForeground:'--accent-foreground',destructive:'--destructive',destructiveForeground:'--destructive-foreground',success:'--success',successForeground:'--success-foreground',warning:'--warning',warningForeground:'--warning-foreground',income:'--income',incomeForeground:'--income-foreground',expense:'--expense',expenseForeground:'--expense-foreground',border:'--border',input:'--input',ring:'--ring',sidebarBackground:'--sidebar-background',sidebarForeground:'--sidebar-foreground',sidebarPrimary:'--sidebar-primary',sidebarPrimaryForeground:'--sidebar-primary-foreground',sidebarAccent:'--sidebar-accent',sidebarAccentForeground:'--sidebar-accent-foreground',sidebarBorder:'--sidebar-border',sidebarRing:'--sidebar-ring',chart1:'--chart-1',chart2:'--chart-2',chart3:'--chart-3',chart4:'--chart-4',chart5:'--chart-5'};
            for (var k in map) { if (pal[k]) document.documentElement.style.setProperty(map[k], pal[k]); }
          }
        }
        
        // Apply layout preset
        var lp = localStorage.getItem('layout-preset');
        if (lp) {
          document.documentElement.setAttribute('data-layout', lp);
          var presets = {
            'modern-glass': { r: '0.75rem', sw: '16rem', cp: '1rem', cpl: '2rem' },
            'professional-compact': { r: '0.25rem', sw: '14rem', cp: '0.75rem', cpl: '1.25rem' },
            'neumorphic-soft': { r: '1.25rem', sw: '17rem', cp: '1.25rem', cpl: '2.5rem' }
          };
          var p = presets[lp];
          if (p) {
            document.documentElement.style.setProperty('--radius', p.r);
            document.documentElement.style.setProperty('--sidebar-width', p.sw);
            document.documentElement.style.setProperty('--container-padding', p.cp);
            document.documentElement.style.setProperty('--container-padding-lg', p.cpl);
          }
        }
      } catch(e) {}
    </script>
